<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sample — Forever Miles</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background: #0c0a10;
    color:#f6f1ec;
    font-family:'Inter',sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    text-align:center;
    padding:2rem
  }
  .badge{
    color: #ffb340;
    background:linear-gradient(115deg, rgba(255, 115, 55, 0.24), rgba(255, 195, 45, 0.2));
    padding:.4rem 1.2rem;
    border-radius:100px;
    font-size:.8rem;
    letter-spacing:.1em;
    text-transform:uppercase;
    margin-bottom:1rem;
    display:inline-block;
    border:1px solid rgba(255, 175, 48, 0.52);
    box-shadow: 0 2px 16px -4px rgba(255, 150, 35, 0.36), inset 0 1px 0 rgba(255, 255, 200, 0.1);
  }
  h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,6vw,4rem);line-height:1.15;margin-bottom:1rem}
  p{color:#b0a0c8;margin-bottom:2rem;font-size:1.05rem;max-width:40ch;margin-inline:auto}
  a{display:inline-block;
    background: linear-gradient(135deg,#d9a868, #e8a0a0);
    color:#1f1e1e;
    text-decoration:none;
    padding:.8rem 2rem;
    border-radius:.5rem;
    font-size:.95rem;
    transition:opacity .2s;
    box-shadow: 0 5px 22px 1px rgba(217, 168, 104, 0.5);
  }
  a:hover{opacity:.85}
</style>
</head>
<body>
  <span class="badge">Sample Preview</span>
  <h1 id="title">Coming Soon...</h1>
  <p>This sample page is not been ready yet. Please Contact Us for more information. We apologize for the inconvenience.</p>
  <a href="forevermiles.html">← Back to Forever Miles</a.>
</body.>
</html>
